<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>slmnet — Classification Demo</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; display: flex; justify-content: center; align-items: center; }
        .container { background: #1e293b; padding: 40px; border-radius: 16px; max-width: 600px; width: 100%; box-shadow: 0 25px 50px rgba(0,0,0,0.4); }
        h1 { text-align: center; font-size: 24px; margin-bottom: 8px; color: #f8fafc; }
        .subtitle { text-align: center; color: #94a3b8; font-size: 14px; margin-bottom: 24px; }
        textarea { width: 100%; min-height: 100px; background: #0f172a; border: 1px solid #334155; border-radius: 8px; padding: 12px; color: #e2e8f0; font-size: 15px; resize: vertical; margin-bottom: 16px; }
        textarea:focus { outline: none; border-color: #3b82f6; }
        button { width: 100%; background: #3b82f6; color: white; border: none; padding: 14px; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
        button:hover { background: #2563eb; }
        button:disabled { background: #475569; cursor: not-allowed; }
        .results { margin-top: 24px; display: none; }
        .result-card { background: #0f172a; border-radius: 8px; padding: 16px; margin-bottom: 12px; }
        .result-label { font-size: 12px; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; }
        .result-value { font-size: 20px; font-weight: 700; color: #3b82f6; margin-top: 4px; }
        pre { background: #0f172a; padding: 16px; border-radius: 8px; font-size: 13px; overflow-x: auto; color: #94a3b8; }
        .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 12px; font-weight: 600; }
        .badge-info { background: #1e3a5f; color: #60a5fa; }
    </style>
</head>
<body>
    <div class="container">
        <h1>slmnet.js</h1>
        <p class="subtitle">Pipeline Classification Demo <span class="badge badge-info">v1.0</span></p>

        <textarea id="input" placeholder="Enter text for analysis...">The phone is great but delivery was 3 days late.</textarea>
        <button id="analyzeBtn">Analyze</button>

        <div class="results" id="results">
            <div class="result-card">
                <div class="result-label">Verdict</div>
                <div class="result-value" id="verdict">—</div>
            </div>
            <div class="result-card">
                <div class="result-label">Full Context</div>
                <pre id="context"></pre>
            </div>
        </div>
    </div>

    <script src="../dist/slmnet.js"></script>
    <script>
        const { default: slmnet } = window.slmnet;

        const btn = document.getElementById('analyzeBtn');
        const input = document.getElementById('input');
        const results = document.getElementById('results');
        const verdict = document.getElementById('verdict');
        const contextPre = document.getElementById('context');

        // Pipeline URL (uses legacy slmnet-project models)
        const pipelineUrl = '../models/review_pipeline.json';

        btn.addEventListener('click', async () => {
            const text = input.value.trim();
            if (!text) return;

            btn.disabled = true;
            btn.textContent = 'Processing...';

            try {
                const ctx = await slmnet.run(pipelineUrl, text);

                results.style.display = 'block';
                verdict.textContent = ctx.final_verdict || 'N/A';
                contextPre.textContent = JSON.stringify(ctx, null, 2);
            } catch (err) {
                results.style.display = 'block';
                verdict.textContent = 'Error';
                contextPre.textContent = err.message;
            } finally {
                btn.disabled = false;
                btn.textContent = 'Analyze';
            }
        });
    </script>
</body>
</html>
