<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>slmnet.js — Демонстрация</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background-color: #f4f7f9; color: #333; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background-color: #fff; padding: 40px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 600px; }
        h1 { text-align: center; color: #1a2a45; }
        textarea { width: 100%; min-height: 120px; border: 1px solid #dce4ec; border-radius: 8px; padding: 15px; font-size: 16px; margin-bottom: 20px; box-sizing: border-box; resize: vertical; }
        button { width: 100%; background-color: #007aff; color: #fff; border: none; padding: 15px; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; transition: background-color 0.2s; }
        button:hover { background-color: #0056b3; }
        button:disabled { background-color: #a0c7e8; cursor: not-allowed; }
        #results-container { margin-top: 30px; }
        h2 { color: #1a2a45; border-bottom: 2px solid #eef2f5; padding-bottom: 10px; }
        pre { background-color: #eef2f5; padding: 20px; border-radius: 8px; white-space: pre-wrap; word-wrap: break-word; font-family: 'Courier New', Courier, monospace; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #007aff; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; margin: 20px auto; display: none; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <h1>slmnet.js Demo</h1>
        <p>Введите отзыв для анализа. Вся обработка, включая две нейросети, происходит прямо в вашем браузере!</p>
        <textarea id="reviewText" placeholder="Пример: 'Телефон отличный, но доставка опоздала на три дня.'"></textarea>
        <button id="analyzeBtn">Анализировать</button>
        <div id="results-container" style="display: none;">
            <h2>Результаты Анализа</h2>
            <div class="spinner" id="spinner"></div>
            <pre id="resultOutput"></pre>
        </div>
    </div>

    <script src="./dist/slmnet.js"></script>
    <script>
        const { default: slmnet } = window.slmnet;

        const analyzeBtn = document.getElementById('analyzeBtn');
        const reviewText = document.getElementById('reviewText');
        const resultsContainer = document.getElementById('results-container');
        const resultOutput = document.getElementById('resultOutput');
        const spinner = document.getElementById('spinner');

        // URL к нашему главному "чертежу" конвейера
        const pipelineUrl = './models/review_pipeline.json';

        analyzeBtn.addEventListener('click', async () => {
            const textToAnalyze = reviewText.value.trim();
            if (!textToAnalyze) {
                alert('Пожалуйста, введите текст для анализа.');
                return;
            }

            // Блокируем кнопку и показываем спиннер
            analyzeBtn.disabled = true;
            resultsContainer.style.display = 'block';
            spinner.style.display = 'block';
            resultOutput.textContent = '';
            
            try {
                // *** ГЛАВНЫЙ ВЫЗОВ SLMNET.JS ***
                // Мы передаем URL конфига и сырой текст.
                const fullContext = await slmnet.run(pipelineUrl, textToAnalyze);
                
                // Форматируем красивый вывод
                const displayResult = {
                    'ИТОГОВЫЙ ВЕРДИКТ': fullContext.final_verdict,
                    'Уверенность Директора (L3)': fullContext.l3_prediction,
                    'Отчет Менеджеров (L2)': {
                        satisfaction: fullContext.l2_satisfaction,
                        security: fullContext.l2_security
                    },
                    'Отчет Эксперта-Нейросети (L1)': fullContext.l1_report
                };

                resultOutput.textContent = JSON.stringify(displayResult, null, 2);

            } catch (error) {
                resultOutput.textContent = `Произошла ошибка:\n\n${error.message}`;
            } finally {
                // Разблокируем кнопку и скрываем спиннер
                analyzeBtn.disabled = false;
                spinner.style.display = 'none';
            }
        });
    </script>
</body>
</html>
